<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style C — Architectural</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: #0e0e0e;
  color: #e8e0d4;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
}

.slide {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: clamp(2rem, 5vw, 5rem);
  position: relative;
  overflow: hidden;
}

/* Grid lines in background */
.grid-lines {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0;
  animation: fadeIn 1.5s 0.1s ease forwards;
}

/* Large background text */
.bg-word {
  position: absolute;
  bottom: -2vw;
  right: -1vw;
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(6rem, 18vw, 18rem);
  font-weight: 600;
  color: rgba(255,255,255,0.025);
  line-height: 1;
  letter-spacing: -4px;
  user-select: none;
  pointer-events: none;
}

/* Top bar */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  opacity: 0;
  animation: fadeIn 0.6s 0.2s ease forwards;
}

.top-left {
  font-size: clamp(0.6rem, 1vw, 0.75rem);
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(232,224,212,0.35);
}

.top-right {
  font-size: clamp(0.6rem, 1vw, 0.75rem);
  letter-spacing: 2px;
  color: rgba(232,224,212,0.25);
  text-align: right;
}

/* Main content */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: clamp(1rem, 3vh, 3rem) 0;
}

.pre-line {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: clamp(0.75rem, 2vh, 1.5rem);
  opacity: 0;
  animation: fadeUp 0.7s 0.4s ease forwards;
}

.pre-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #c8a96e;
}

.pre-text {
  font-size: clamp(0.65rem, 1.1vw, 0.8rem);
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #c8a96e;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 9vw, 8rem);
  font-weight: 400;
  line-height: 0.95;
  color: #e8e0d4;
  letter-spacing: -2px;
  opacity: 0;
  animation: fadeUp 0.9s 0.55s cubic-bezier(0.16,1,0.3,1) forwards;
}

h1 em {
  font-style: italic;
  color: rgba(200,169,110,0.8);
}

.sub-row {
  display: flex;
  align-items: center;
  gap: clamp(1rem, 3vw, 3rem);
  margin-top: clamp(1.5rem, 3vh, 2.5rem);
  opacity: 0;
  animation: fadeUp 0.8s 0.75s ease forwards;
}

.sub-line {
  flex: 1;
  height: 1px;
  background: rgba(200,169,110,0.2);
}

.sub-text {
  font-size: clamp(0.75rem, 1.4vw, 0.95rem);
  font-weight: 300;
  color: rgba(232,224,212,0.5);
  white-space: nowrap;
}

/* Bottom bar */
.bottom-bar {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  opacity: 0;
  animation: fadeIn 0.6s 1s ease forwards;
}

.bottom-left {
  font-size: clamp(0.7rem, 1.2vw, 0.85rem);
  font-weight: 300;
  color: rgba(232,224,212,0.35);
  line-height: 1.8;
}

.slide-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 4vw, 3.5rem);
  color: rgba(200,169,110,0.15);
  line-height: 1;
}

.style-label {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(200,169,110,0.1);
  border: 1px solid rgba(200,169,110,0.25);
  border-radius: 4px;
  padding: 4px 12px;
  font-size: 11px;
  letter-spacing: 1px;
  color: #c8a96e;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>
<body>
<div class="slide">
  <div class="grid-lines"></div>
  <div class="bg-word">SHADE</div>
  <div class="style-label">STYLE C — ARCHITECTURAL</div>

  <div class="top-bar">
    <div class="top-left">Peabody Heights Brewery · Baltimore, MD</div>
    <div class="top-right">Design Proposal<br>March 2026</div>
  </div>

  <div class="main">
    <div class="pre-line">
      <div class="pre-dot"></div>
      <div class="pre-text">Outdoor Infrastructure</div>
    </div>
    <h1>Retractable<br><em>Shade Sail</em><br>System</h1>
    <div class="sub-row">
      <div class="sub-line"></div>
      <div class="sub-text">Three sails · Winch-lowered · Direct-sourced</div>
      <div class="sub-line"></div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="bottom-left">
      Prepared by Max Moore<br>
      <span style="color: rgba(200,169,110,0.5);">Industrial Design</span>
    </div>
    <div class="slide-num">01</div>
  </div>
</div>
</body>
</html>
