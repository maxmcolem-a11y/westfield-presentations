<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEP Thumbnail Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff 0%, #f3f3ef 100%);
      font-family: Inter, Arial, Helvetica, sans-serif;
    }
    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #status {
      position: absolute;
      left: 24px;
      bottom: 24px;
      padding: 10px 14px;
      font-size: 14px;
      color: #444;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      transition: opacity 0.2s ease;
    }

    body[data-ready="true"] #status {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="status">Loading…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/occt-import-js@0.0.23/dist/occt-import-js.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';

    const statusEl = document.getElementById('status');
    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);
    const modelParam = params.get('model');
    const rotateYDeg = Number(params.get('rotateYDeg') || '180');
    const zoom = Number(params.get('zoom') || '1.42');

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, 1, 0.01, 1000);
    camera.position.set(3, 2.2, 3);

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0xded6ca, 1.55);
    hemiLight.position.set(0, 6, 0);
    scene.add(hemiLight);

    const key = new THREE.DirectionalLight(0xffffff, 1.4);
    key.position.set(4, 6, 6);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0xf3efe7, 0.75);
    fill.position.set(-4, 3, -3);
    scene.add(fill);

    const ambient = new THREE.AmbientLight(0xffffff, 0.55);
    scene.add(ambient);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(20, 96),
      new THREE.ShadowMaterial({ opacity: 0.06 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.8;
    scene.add(ground);

    function resize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    function colorFromArray(color) {
      if (!Array.isArray(color) || color.length < 3) return new THREE.Color('#c8a58f');
      const normalize = color.some((v) => v > 1) ? 255 : 1;
      return new THREE.Color(color[0] / normalize, color[1] / normalize, color[2] / normalize);
    }

    function fitCameraToObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      if (box.isEmpty()) return;
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxSize = Math.max(size.x, size.y, size.z) || 1;
      const distance = maxSize * zoom;
      camera.position.copy(center.clone().add(new THREE.Vector3(distance, distance * 0.72, distance)));
      camera.near = Math.max(maxSize / 1000, 0.01);
      camera.far = Math.max(maxSize * 50, 100);
      camera.updateProjectionMatrix();
      camera.lookAt(center);
      ground.position.y = box.min.y - Math.max(size.y * 0.08, 0.03);
    }

    async function getOcct() {
      if (!window.occtimportjs) throw new Error('occt-import-js failed to load');
      return window.occtimportjs();
    }

    async function load() {
      try {
        if (!modelParam) throw new Error('No model query parameter provided');
        statusEl.textContent = 'Loading model…';
        const occt = await getOcct();
        const response = await fetch(`assets/models/${modelParam}`);
        if (!response.ok) throw new Error(`Could not fetch ${modelParam}`);
        const buffer = new Uint8Array(await response.arrayBuffer());
        const result = occt.ReadStepFile(buffer, {
          linearUnit: 'millimeter',
          linearDeflectionType: 'bounding_box_ratio',
          linearDeflection: 0.0015,
          angularDeflection: 0.4
        });
        if (!result.success) throw new Error('STEP import failed');

        const group = new THREE.Group();
        result.meshes.forEach((meshData, meshIndex) => {
          const geometry = new THREE.BufferGeometry();
          const positions = meshData.attributes?.position?.array || [];
          const normals = meshData.attributes?.normal?.array || [];
          const indices = meshData.index?.array || [];
          geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
          if (normals.length) geometry.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
          else geometry.computeVertexNormals();
          if (indices.length) geometry.setIndex(indices);
          geometry.computeBoundingSphere();

          const material = new THREE.MeshStandardMaterial({
            color: colorFromArray(meshData.color),
            roughness: 0.72,
            metalness: 0.04,
            side: THREE.DoubleSide
          });
          const mesh = new THREE.Mesh(geometry, material);
          mesh.name = meshData.name || `mesh-${meshIndex + 1}`;
          group.add(mesh);
        });

        group.rotation.x = -Math.PI / 2;
        group.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), THREE.MathUtils.degToRad(rotateYDeg));
        scene.add(group);
        fitCameraToObject(group);
        renderer.render(scene, camera);
        statusEl.textContent = 'READY';
        document.body.dataset.ready = 'true';
      } catch (error) {
        console.error(error);
        statusEl.textContent = `ERROR: ${error.message}`;
        document.body.dataset.ready = 'error';
      }
    }

    resize();
    window.addEventListener('resize', () => {
      resize();
      renderer.render(scene, camera);
    });

    load();
  </script>
</body>
</html>
