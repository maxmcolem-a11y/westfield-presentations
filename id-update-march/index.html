<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Update — March 2026</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-snap-type: y mandatory;
  scroll-behavior: smooth;
  height: 100%;
  background: #111;
}

body {
  background: #111;
  height: 100%;
}

.slide {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  scroll-snap-align: start;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.slide img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: block;
  user-select: none;
}

/* Nav dots */
.nav-dots {
  position: fixed;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 100;
}
.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  cursor: pointer;
  border: none;
  padding: 0;
  transition: all 0.25s ease;
}
.nav-dot.active {
  background: #fff;
  transform: scale(1.5);
}
.nav-dot:hover { background: rgba(255,255,255,0.6); }

/* Progress bar */
.progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  background: #fff;
  width: 0%;
  z-index: 100;
  transition: width 0.3s ease;
}

/* Slide counter */
.slide-counter {
  position: fixed;
  bottom: 16px;
  right: 20px;
  font-family: sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 2px;
  z-index: 100;
}

/* Arrow nav */
.arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.08);
  border: none;
  color: rgba(255,255,255,0.4);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: all 0.2s;
}
.arrow:hover { background: rgba(255,255,255,0.18); color: #fff; }
.arrow-prev { left: 10px; }
.arrow-next { right: 36px; }

@media (max-width: 600px) {
  .arrow { display: none; }
  .nav-dots { right: 6px; }
}
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>
<nav class="nav-dots" id="navDots"></nav>
<div class="slide-counter" id="slideCounter">1 / 7</div>
<button class="arrow arrow-prev" id="arrowPrev">&#8592;</button>
<button class="arrow arrow-next" id="arrowNext">&#8594;</button>

<div class="slide"><img src="slide1.png" alt="Slide 1" draggable="false"/></div>
<div class="slide"><img src="slide2.png" alt="Slide 2" draggable="false"/></div>
<div class="slide"><img src="slide3.png" alt="Slide 3" draggable="false"/></div>
<div class="slide"><img src="slide4.png" alt="Slide 4" draggable="false"/></div>
<div class="slide"><img src="slide5.png" alt="Slide 5" draggable="false"/></div>
<div class="slide"><img src="slide6.png" alt="Slide 6" draggable="false"/></div>
<div class="slide"><img src="slide7.png" alt="Slide 7" draggable="false"/></div>

<script>
const slides = Array.from(document.querySelectorAll('.slide'));
const total = slides.length;
const progressBar = document.getElementById('progressBar');
const navDotsEl = document.getElementById('navDots');
const slideCounter = document.getElementById('slideCounter');
let current = 0;

// Build dots
const dots = slides.map((_, i) => {
  const dot = document.createElement('button');
  dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
  dot.setAttribute('aria-label', `Slide ${i + 1}`);
  dot.addEventListener('click', () => goTo(i));
  navDotsEl.appendChild(dot);
  return dot;
});

function goTo(idx) {
  slides[idx].scrollIntoView({ behavior: 'smooth' });
}

function update(idx) {
  current = idx;
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  progressBar.style.width = (total > 1 ? (idx / (total - 1)) * 100 : 100) + '%';
  slideCounter.textContent = `${idx + 1} / ${total}`;
}

// Observer
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) update(slides.indexOf(e.target));
  });
}, { threshold: 0.5 });
slides.forEach(s => observer.observe(s));

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault(); goTo(Math.min(current + 1, total - 1));
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault(); goTo(Math.max(current - 1, 0));
  }
});

// Arrow buttons
document.getElementById('arrowPrev').addEventListener('click', () => goTo(Math.max(current - 1, 0)));
document.getElementById('arrowNext').addEventListener('click', () => goTo(Math.min(current + 1, total - 1)));

// Touch swipe
let touchY = 0;
document.addEventListener('touchstart', e => { touchY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', e => {
  const diff = touchY - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 40) {
    if (diff > 0) goTo(Math.min(current + 1, total - 1));
    else goTo(Math.max(current - 1, 0));
  }
}, { passive: true });

// Throttled wheel
let lastWheel = 0;
document.addEventListener('wheel', e => {
  const now = Date.now();
  if (now - lastWheel < 700) return;
  lastWheel = now;
  if (e.deltaY > 20) goTo(Math.min(current + 1, total - 1));
  else if (e.deltaY < -20) goTo(Math.max(current - 1, 0));
}, { passive: true });
</script>
</body>
</html>
